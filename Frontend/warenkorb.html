<!doctype html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FUSE-SHOP - Warenkorb</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="header.js" defer></script>
  <link rel="icon" href="data:;base64,iVBORw0KGgo=">
</head>

<body class="bg-white text-stone-900">


  <main>
    <div class="min-h-screen pt-20 px-4" style="background-color: #F9F9F7;">
      
      <div id="cart-container" class="max-w-3xl mx-auto bg-white p-8 rounded-2xl shadow"></div>

    </div>
  </main>


  <script>
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    function saveCart() {
      localStorage.setItem("cart", JSON.stringify(cart));
    }

    function renderCart() {
      const container = document.getElementById("cart-container");

      if (cart.length === 0) {
        container.innerHTML = `
          <h2 class="text-2xl font-bold mb-4">Ihr Warenkorb ist leer</h2>
          <a href="/Frontend/product.html" class="bg-amber-600 text-white px-6 py-3 rounded">Produkte entdecken</a>
        `;
        return;
      }

      let html = "<h2 class='text-2xl font-bold mb-6'>Ihr Warenkorb</h2>";

      let total = 0;

      cart.forEach((item, index) => {
        total += item.price * item.quantity;

        html += `
          <div class="border-b py-4 flex justify-between items-center">
            <div>
              <h3 class="font-semibold">${item.name}</h3>
              <p>${item.price} €</p>
            </div>

            <div class="flex items-center gap-2">
              <button onclick="changeQuantity(${index}, -1)" class="px-2 bg-gray-200">-</button>
              <span>${item.quantity}</span>
              <button onclick="changeQuantity(${index}, 1)" class="px-2 bg-gray-200">+</button>
            </div>

            <button onclick="removeFromCart(${index})" class="text-red-500">❌</button>
          </div>
        `;
      });

      html += `
        <div class="mt-6">
          <h3 class="text-xl font-bold">Gesamt: ${total.toFixed(2)} €</h3>
          <button onclick="checkout()" class="mt-4 bg-green-600 text-white px-6 py-3 rounded">
            Checkout
          </button>
        </div>
      `;

      container.innerHTML = html;
    }

    function changeQuantity(index, amount) {
      cart[index].quantity += amount;

      if (cart[index].quantity <= 0) {
        cart.splice(index, 1);
      }

      saveCart();
      renderCart();
    }

    function removeFromCart(index) {
      cart.splice(index, 1);
      saveCart();
      renderCart();
    }

    function checkout() {
      alert("Danke für Ihren Einkauf!");
      cart = [];
      saveCart();
      renderCart();
    }

    renderCart();
  </script>

</body>
</html>
